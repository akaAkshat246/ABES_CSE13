<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document</title>

<style>
.box{
    border:1px solid black;
    padding:10px;
    width:150px;
    display:inline-block;
    margin:10px;
}
</style>

</head>

<body>

<script>

document.write("<div class='box'>");
document.write("<div style='color:blue; font-size:20px;'>Table of 2</div><br>");

for (var i = 1; i <= 10; i++) {
    document.write("2 X " + i + " = " + (2*i) + "<br>");
}

document.write("</div>");


document.write("<div class='box'>");
document.write("<div style='color:green; font-size:20px;'>Table of 3</div><br>");

for (var j = 1; j <= 10; j++) {
    document.write("3 X " + j + " = " + (3*j) + "<br>");
}

document.write("</div>");

</script>

</body>
</html>
