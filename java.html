<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centered Popup Example</title>

    <style>
        .popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }

        .popup-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
    </style>

</head>
<body>

<h1>Hello, World!</h1>
<p>This is a simple HTML document.</p>

<button onclick="showPopup()">Open Popup</button>


<div id="popup" class="popup">
  <div class="popup-box">
    <p>Enter your name:</p>
    <input type="text" id="nameInput">
    <br><br>
    <button onclick="submitName()">Submit</button>
  </div>
</div>

</body>
</html>
