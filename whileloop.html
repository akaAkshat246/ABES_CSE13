<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASCII Table</title>

<style>
.box{
    width:200px;
    margin:100px auto;
    border:2px solid purple;
    text-align:center;
    padding:20px;
    font-size:20px;
}
.title{
    color:purple;
    font-weight:bold;
    margin-bottom:10px;
}
</style>

</head>
<body>

<div class="box">
<div class="title">ASCII Table</div>

<script>
let i = 65;
while (i <= 90) {
    document.write(String.fromCharCode(i) + "<br>");
    i++;
}
</script>

</div>

</body>
</html>
